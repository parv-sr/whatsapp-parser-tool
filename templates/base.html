<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WhatsApp Parser • Real Estate Intelligence{% endblock %}</title>
    <meta name="description" content="Extract and analyze real estate listings from WhatsApp chats with AI-powered parsing.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='20' fill='%230a1120'/%3E%3Cpath d='M26 21h44a8 8 0 0 1 8 8v40a8 8 0 0 1-8 8H42l-14 12 4-12h-6a8 8 0 0 1-8-8V29a8 8 0 0 1 8-8z' fill='%2325D366'/%3E%3Cpath d='M36 40h24M36 52h19' stroke='%230a1120' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pico-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --brand: #25d366;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--pico-font-family);
            background:
                radial-gradient(circle at 0% 0%, rgba(37, 211, 102, 0.12), transparent 45%),
                radial-gradient(circle at 100% 0%, rgba(59, 130, 246, 0.16), transparent 45%),
                linear-gradient(140deg, #040813 0%, #0b1221 52%, #081324 100%);
            color: #dbe7ff;
        }
        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(14px);
            background: rgba(4, 8, 19, 0.72);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        .brand {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: .6rem;
        }
        .brand i {
            color: var(--brand);
            font-size: 1.35rem;
        }
        .nav-pill {
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 999px;
            padding: .35rem .85rem;
            color: #d9e2f5;
            text-decoration: none;
            font-size: .9rem;
            transition: .2s ease;
        }
        .nav-pill:hover,
        .nav-pill.active {
            border-color: rgba(37, 211, 102, 0.6);
            background: rgba(37, 211, 102, 0.12);
            color: #fff;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 18px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.28);
        }
        .messages article {
            border-radius: 12px;
            border-left: 4px solid;
            padding: .8rem 1rem;
            margin: .75rem 0;
            backdrop-filter: blur(5px);
        }
        .messages .success { border-color: #22c55e; background: rgba(34, 197, 94, 0.12); }
        .messages .error { border-color: #ef4444; background: rgba(239, 68, 68, 0.12); }
        main { padding: 1.6rem 0 2.4rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="top-nav py-3">
        <div class="shell d-flex flex-wrap justify-content-between align-items-center gap-3">
            <a href="{% url 'ingestion:upload_files' %}" class="brand">
                <i class="bi bi-whatsapp"></i>
                <span>WhatsApp Parser</span>
            </a>
            <nav class="d-flex flex-wrap gap-2 align-items-center">
                {% if user.is_authenticated %}
                    <a href="{% url 'ingestion:upload_files' %}" class="nav-pill {% if request.resolver_match.url_name == 'upload_files' %}active{% endif %}">Upload</a>
                    <a href="{% url 'ingestion:uploads_list' %}" class="nav-pill {% if request.resolver_match.url_name == 'uploads_list' %}active{% endif %}">Uploads</a>
                    <a href="{% url 'core:chat_view' %}" class="nav-pill {% if 'chat' in request.resolver_match.url_name %}active{% endif %}">Chat</a>
                    <a href="{% url 'users:logout' %}" class="nav-pill">Logout</a>
                {% else %}
                    <a href="{% url 'users:login' %}" class="nav-pill">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        <div class="shell">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <article class="{{ message.tags|default:'success' }}">{{ message|safe }}</article>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
