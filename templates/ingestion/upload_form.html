{% extends "base.html" %}

{% block content %}
<style>
    /* Scoped styles for the upload form 
       Using a glassmorphism look to match the modern vibe
    */
    .upload-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 2rem;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 3rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        max-width: 600px;
        width: 100%;
        text-align: center;
    }

    .glass-card h2 {
        margin-bottom: 0.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(to right, #fff, #a5f3fc);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .glass-card p {
        color: #94a3b8;
        margin-bottom: 2rem;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .file-upload-area {
        border: 2px dashed rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 3rem 1.5rem;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
    }

    .file-upload-area:hover, .file-upload-area.dragover {
        border-color: #38bdf8; /* sky-400 */
        background: rgba(56, 189, 248, 0.05);
    }

    .file-upload-text strong {
        display: block;
        font-size: 1.1rem;
        color: #e2e8f0;
        margin-bottom: 0.5rem;
    }

    .file-upload-text small {
        color: #64748b;
    }

    /* Hide the actual input but keep it functional */
    input[type="file"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
    }

    button[type="submit"] {
        background: var(--pico-primary-background, linear-gradient(135deg, #0066ff, #00aaff));
        color: white;
        border: none;
        padding: 0.9rem 1rem;
        font-weight: 600;
        font-size: 1.1rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
    }

    button[type="submit"]:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 102, 255, 0.5);
    }

    button[type="submit"]:active {
        transform: translateY(-1px);
    }
</style>

<div class="upload-wrapper">
    <article class="glass-card">
        <h2>Upload WhatsApp Chats</h2>
        <p>Select or drop your exported .txt files, or archives (.zip/.rar) containing one .txt chat export</p>

        <form method="post" enctype="multipart/form-data" id="uploadForm">
            {% csrf_token %}

            <label for="files" class="file-upload-area" id="fileUploadArea">
                <div class="file-upload-text">
                    <strong>Click to upload or drop files here</strong>
                    <small>.txt, .zip, .rar supported • Archives must contain exactly one .txt chat export</small>
                    <div id="file-list" style="margin-top: 1rem; color: #4ade80; font-size: 0.95rem; font-weight: 600;"></div>
                </div>
                <input 
                    type="file" 
                    name="files" 
                    id="files" 
                    multiple 
                    accept=".txt,.zip,.rar,text/plain,application/zip,application/x-rar-compressed" 
                    required 
                />
            </label>

            <button type="submit">Start Processing</button>
        </form>
    </article>
</div>

<script>
document.getElementById('fileUploadArea').addEventListener('dragover', (e) => {
    e.preventDefault();
    e.currentTarget.classList.add('dragover');
});

document.getElementById('fileUploadArea').addEventListener('dragleave', (e) => {
    e.currentTarget.classList.remove('dragover');
});

document.getElementById('fileUploadArea').addEventListener('drop', (e) => {
    e.currentTarget.classList.remove('dragover');
});

const fileInput = document.getElementById('files');
const fileList = document.getElementById('file-list');

fileInput.addEventListener('change', (e) => {
    const count = e.target.files.length;
    if (count > 0) {
        if (count === 1) {
            fileList.textContent = `Selected: ${e.target.files[0].name}`;
        } else {
            fileList.textContent = `Selected: ${count} files`;
        }
    } else {
        fileList.textContent = '';
    }
});
</script>
{% endblock %}
