{% extends "base.html" %}

{% block title %}Upload chats • WhatsApp Parser{% endblock %}

{% block content %}
<style>
    .upload-layout { max-width: 960px; margin: 0 auto; }
    .hero-card { padding: 2rem; }
    .hero-note { color: #a8bad9; }
    .upload-zone {
        border: 2px dashed rgba(148, 163, 184, .45);
        border-radius: 16px;
        padding: 2.2rem 1.4rem;
        text-align: center;
        background: rgba(15, 23, 42, .35);
        cursor: pointer;
        position: relative;
        transition: .2s ease;
    }
    .upload-zone:hover, .upload-zone.dragover {
        border-color: rgba(37, 211, 102, .85);
        background: rgba(37, 211, 102, .1);
    }
    .upload-zone input[type="file"] {
        position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .file-preview { color: #8df6bd; font-size: .95rem; margin-top: .6rem; min-height: 1.3rem; }
</style>

<section class="upload-layout">
    <div class="glass-card hero-card">
        <h2 class="h3 mb-2">Upload WhatsApp chat exports</h2>
        <p class="hero-note mb-4">Drag & drop <strong>.txt</strong> files or archives (<strong>.zip/.rar</strong>) containing exactly one text chat export.</p>

        <form method="post" enctype="multipart/form-data" id="uploadForm" class="d-grid gap-3">
             {% csrf_token %}
            <label for="files" class="upload-zone" id="fileUploadArea">
                <i class="bi bi-cloud-arrow-up-fill" style="font-size:2.2rem;color:#25d366"></i>
                <div class="mt-2 fw-semibold">Click to select files or drop them here</div>
                <small class="text-secondary">Supported: .txt, .zip, .rar</small>
                <div id="file-list" class="file-preview"></div>
                <input type="file" name="files" id="files" multiple accept=".txt,.zip,.rar,text/plain,application/zip,application/x-rar-compressed" required>
            </label>
            <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-lightning-charge-fill me-2"></i>Start upload now</button>
        </form>
    </div>
</section>

<script>
    const area = document.getElementById('fileUploadArea');
    const input = document.getElementById('files');
    const list = document.getElementById('file-list');

    ['dragover', 'dragleave', 'drop'].forEach((eventName) => {
        area.addEventListener(eventName, (e) => {
            if (eventName !== 'dragleave') e.preventDefault();
            area.classList.toggle('dragover', eventName === 'dragover');
        });
    });

    input.addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length) {
            list.textContent = '';
        } else if (files.length === 1) {
            list.textContent = `Selected: ${files[0].name}`;
        } else {
            list.textContent = `Selected: ${files.length} files`;
        }
    });
</script>
{% endblock %}
