{% extends 'base.html' %}
{% block title %}AI Chat{% endblock %}

{% block content %}

<style>
    /* --- 1. PAGE LAYOUT --- */
    body {
        overflow: hidden !important;
        height: 100vh;
    }

    main.container {
        height: 100%;
        max-width: 100% !important;
        padding: 0 !important;
        display: flex;
        flex-direction: column;
    }

    /* --- 2. CHAT WRAPPER --- */
    #chat-wrapper {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        position: relative;
        height: 100%;
    }

    /* --- 3. CHAT WINDOW (FIXED BOTTOM SCROLL) --- */
    #chat-window {
        flex-grow: 1;
        overflow-y: auto;
        
        /* Top padding for header clearance */
        padding-top: 6rem; 
        padding-left: 1rem;
        padding-right: 1rem;
        
        /* We remove padding-bottom here and use the ::after pseudo-element below 
           This is a robust fix for Chrome/Safari scrolling issues */
        padding-bottom: 0; 

        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    /* THE MAGIC FIX: This creates a solid invisible block at the bottom */
    #chat-window::after {
        content: "";
        display: block;
        height: 15rem; /* Creates exactly enough scrollable space */
        width: 100%;
    }

    /* --- 4. MESSAGE BUBBLES --- */
    .msg {
        max-width: 80%;
        padding: 0.6rem 1rem; 
        margin-bottom: 0.8rem;
        border-radius: 16px;
        position: relative;
        animation: slideUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        line-height: 1.5;
        font-size: 0.9rem; 
        word-break: break-word;
        backdrop-filter: blur(10px);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .user-msg {
        background: linear-gradient(135deg, var(--pico-primary) 0%, #2f5769 100%);
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.1);
    }

    .assistant-msg {
        background: rgba(0, 0, 0, 0.4);
        color: #e0e0e0;
        margin-right: auto;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        width: fit-content;
        max-width: 95%; /* Allow tables to expand */
    }

    /* --- 5. TABLE STYLING --- */
    .msg table {
        display: block;
        overflow-x: auto;
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 0.5rem 0 0.2rem 0;
        background: rgba(0,0,0,0.3);
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .user-msg table { background: rgba(0,0,0,0.1); color: white; }

    .msg th, .msg td {
        white-space: nowrap;
        padding: 0.5rem 0.8rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        text-align: left;
        font-size: 0.85rem;
    }

    .msg th {
        background: rgba(0,0,0,0.2);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: rgba(255,255,255,0.6);
    }
    .msg tr:last-child td { border-bottom: none; }

    /* --- 6. FLOATING INPUT BAR --- */
    #chat-input-bar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 800px;
        z-index: 1000;
        background: transparent !important;
    }

    #chat-form {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 6px 6px 20px;
        background: rgba(0, 0, 0, 0.5); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 100px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2); 
    }

    #chat-input {
        flex: 1;
        border: none !important;
        background: transparent !important;
        color: white !important;
        font-size: 0.95rem;
        padding: 5px;
        outline: none !important;
        box-shadow: none !important;
    }
    
    #chat-input::placeholder { color: rgba(255,255,255,0.4); }

    .send-btn {
        width: 45px !important;
        height: 45px !important;
        border-radius: 50%;
        background: var(--pico-primary-background);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        cursor: pointer;
        flex-shrink: 0;
        padding: 0;
    }

    .send-btn:hover {
        transform: scale(1.05);
        filter: brightness(1.2);
    }

    .send-btn svg {
        width: 20px;
        height: 20px;
        fill: white !important;
        margin-left: 2px;
    }

    /* --- 7. SOURCE MODAL --- */
    .source-btn {
        background: rgba(56, 189, 248, 0.15);
        color: #38bdf8;
        border: 1px solid rgba(56, 189, 248, 0.3);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
        white-space: nowrap;
    }
    .source-btn:hover {
        background: rgba(56, 189, 248, 0.3);
        border-color: #38bdf8;
        color: white;
    }

    dialog article {
        background: rgba(20, 25, 35, 0.95) !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        max-width: 800px;
        width: 100%;
        color: white;
    }
    
    dialog header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 1rem;
    }

    .raw-msg-box {
        background: rgba(0,0,0,0.3);
        padding: 1rem;
        border-radius: 8px;
        font-family: monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        color: #a0a0a0;
        max-height: 50vh;
        overflow-y: auto;
        border: 1px solid rgba(255,255,255,0.05);
    }
</style>

<div id="chat-wrapper">
    <div id="chat-window"></div>
</div>

<div id="chat-input-bar">
    <form id="chat-form">
        <input type="text" id="chat-input" placeholder="Ask about properties…" required autocomplete="off">
        <button type="submit" class="send-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </form>
</div>

<dialog id="source-modal">
    <article>
        <header>
            <button aria-label="Close" rel="prev" onclick="closeSourceModal()"></button>
            <h3 id="modal-title">Original Message</h3>
        </header>
        <p style="font-size: 0.9rem; color: #888; margin-bottom: 0.5rem;">
            Sender: <span id="modal-sender" style="color:white"></span> | 
            Time: <span id="modal-time" style="color:white"></span>
        </p>
        <pre id="modal-content" class="raw-msg-box">Loading...</pre>
    </article>
</dialog>

{{ history|json_script:"chat-history" }}

<script>
    const serverHistory = JSON.parse(document.getElementById("chat-history").textContent);
</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const chatWindow = document.getElementById("chat-window");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const modal = document.getElementById("source-modal");

    // --- Modal Functions ---
    function closeSourceModal() {
        modal.removeAttribute("open");
    }

    async function openSourceModal(listingId) {
        modal.setAttribute("open", true);
        document.getElementById("modal-content").textContent = "Loading original message...";
        document.getElementById("modal-sender").textContent = "...";
        document.getElementById("modal-time").textContent = "...";

        try {
            const res = await fetch(`/core/chat/source/${listingId}/`);
            if (!res.ok) throw new Error("Failed to fetch");
            const data = await res.json();
            
            document.getElementById("modal-content").textContent = data.raw_text;
            document.getElementById("modal-sender").textContent = data.sender;
            document.getElementById("modal-time").textContent = data.timestamp || "N/A";
        } catch (e) {
            document.getElementById("modal-content").textContent = "Error loading source message. It may have been deleted.";
        }
    }

    // --- Chat Functions ---

    function saveMessage(role, text) {
        const history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
        history.push({ role, text });
        localStorage.setItem("chatHistory", JSON.stringify(history));
    }
    
    function formatMessage(role, text) {
        const div = document.createElement("div");
        div.classList.add("msg", role === "user" ? "user-msg" : "assistant-msg");
        
        if (role === "assistant") {
            // Render Markdown
            div.innerHTML = marked.parse(text);
            
            // Post-process Tables to add "View Source" buttons
            const tables = div.querySelectorAll("table");
            tables.forEach(table => {
                // Find index of "ID" column
                let idColIndex = -1;
                const headers = table.querySelectorAll("th");
                headers.forEach((th, idx) => {
                    const txt = th.textContent.trim().toLowerCase();
                    if (txt === "id" || txt === "_id") {
                        idColIndex = idx;
                        th.textContent = "Source"; // Rename header
                    }
                });

                if (idColIndex !== -1) {
                    const rows = table.querySelectorAll("tbody tr");
                    rows.forEach(row => {
                        const cells = row.querySelectorAll("td");
                        if (cells[idColIndex]) {
                            const idVal = cells[idColIndex].textContent.trim();
                            // Clear ID and replace with button
                            cells[idColIndex].innerHTML = ""; 
                            
                            const btn = document.createElement("button");
                            btn.className = "source-btn";
                            btn.textContent = "View Message";
                            btn.onclick = () => openSourceModal(idVal);
                            
                            cells[idColIndex].appendChild(btn);
                        }
                    });
                }
            });

        } else {
            div.textContent = text; 
        }
        return div;
    }

    // Load initial history
    serverHistory.forEach(msg => {
        const bubble = formatMessage(msg.role, msg.content);
        chatWindow.appendChild(bubble);
    });
    // Scroll to bottom initially
    chatWindow.scrollTop = chatWindow.scrollHeight;

    chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;

        chatWindow.appendChild(formatMessage("user", question));
        // saveMessage("user", question); // Optional: if using local storage sync
        chatInput.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const res = await fetch("/core/chat/query/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ query: question, top_k: 5 })
            });

            const data = await res.json();
            let answer = data.answer || "⚠️ Error retrieving response.";

            chatWindow.appendChild(formatMessage("assistant", answer));
            // saveMessage("assistant", answer); 
        } catch (err) {
            chatWindow.appendChild(formatMessage("assistant", "⚠️ Connection error."));
        }

        chatWindow.scrollTop = chatWindow.scrollHeight;
    });
</script>

{% endblock %}
