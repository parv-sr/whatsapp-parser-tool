{% extends 'base.html' %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<style>
    html, body {
        overflow: hidden;
    }

    main {
        padding-bottom: 7rem;
    }

    #chat-shell {
        width: min(1080px, 100%);
        margin: 0 auto;
        height: calc(100vh - 210px);
        min-height: 420px;
        display: flex;
        flex-direction: column;
    }

    #chat-wrapper {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
    }

    #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.25rem 7.5rem;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    #chat-window::-webkit-scrollbar {
        width: 0;
        height: 0;
    }

    .msg {
        max-width: min(800px, 92%);
        margin-bottom: 0.65rem;
        padding: 0.62rem 0.82rem;
        border-radius: 14px;
        border: 1px solid var(--pico-muted-border-color);
        font-size: 0.86rem;
        line-height: 1.45;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    .user-msg {
        margin-left: auto;
        color: #eaf4ff;
        background: linear-gradient(145deg, rgba(30, 64, 175, 0.92), rgba(37, 99, 235, 0.85));
        border-bottom-right-radius: 4px;
    }

    .assistant-msg {
        margin-right: auto;
        color: #dde7f8;
        background: rgba(17, 24, 39, 0.8);
        border-bottom-left-radius: 4px;
    }

    .msg h1, .msg h2, .msg h3, .msg h4 {
        margin: 0.3rem 0;
        font-size: 0.92rem;
    }

    .msg p, .msg li {
        margin: 0.28rem 0;
    }

    .msg ul, .msg ol {
        margin: 0.32rem 0 0.42rem 1rem;
    }

    .msg table {
        width: 100%;
        display: block;
        overflow-x: auto;
        border-collapse: collapse;
        margin-top: 0.5rem;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .msg table::-webkit-scrollbar {
        width: 0;
        height: 0;
    }

    .msg th, .msg td {
        padding: 0.42rem 0.56rem;
        white-space: nowrap;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
    }

    .msg th {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #93c5fd;
        font-size: 0.72rem;
    }

    #chat-input-bar {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        width: min(1020px, 96%);
        z-index: 80;
    }

    #chat-form {
        display: grid;
        grid-template-columns: 170px 1fr auto auto;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 14px;
        background: rgba(12, 18, 32, 0.92);
        backdrop-filter: blur(10px);
    }

    .control,
    #chat-input {
        height: 38px;
        margin: 0;
        border-radius: 10px;
        font-size: 0.82rem;
        padding: 0 0.7rem;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.82);
        color: #dbeafe;
    }

    #chat-input::placeholder {
        color: rgba(203, 213, 225, 0.75);
    }

    #chat-input:focus,
    .control:focus {
        outline: none;
        border-color: rgba(56, 189, 248, 0.7);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    #chat-input:-webkit-autofill,
    #chat-input:-webkit-autofill:hover,
    #chat-input:-webkit-autofill:focus {
        -webkit-text-fill-color: #dbeafe;
        box-shadow: 0 0 0 1000px rgba(15, 23, 42, 0.95) inset;
        transition: background-color 9999s ease-in-out 0s;
    }

    #chat-status {
        font-size: 0.72rem;
        color: #9fb0c5;
        min-width: 96px;
        text-align: right;
    }

    .send-btn {
        width: 38px;
        height: 38px;
        margin: 0;
        border-radius: 999px;
        border: none;
        background: linear-gradient(145deg, #0ea5e9, #2563eb);
        display: grid;
        place-items: center;
        cursor: pointer;
    }

    .send-btn svg {
        width: 16px;
        height: 16px;
        fill: white;
    }

    .source-btn {
        margin: 0;
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
        border: 1px solid rgba(56, 189, 248, 0.5);
        background: linear-gradient(145deg, rgba(14, 165, 233, 0.25), rgba(37, 99, 235, 0.18));
        color: #c7ebff;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .source-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.9);
        background: linear-gradient(145deg, rgba(14, 165, 233, 0.35), rgba(37, 99, 235, 0.3));
    }

    dialog::backdrop {
        background: rgba(2, 6, 23, 0.75);
    }

    #source-modal {
        padding: 0;
        border: none;
        max-width: min(860px, 95vw);
        width: 100%;
        background: transparent;
    }

    #source-modal article {
        margin: 0;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: linear-gradient(165deg, rgba(15, 23, 42, 0.98), rgba(11, 18, 34, 0.98)) !important;
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
        overflow: hidden;
    }

    .source-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.1rem 0.7rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.55);
    }

    .source-modal-title {
        margin: 0;
        color: #e2e8f0;
        font-size: 1.25rem;
        font-weight: 700;
    }

    .modal-close-btn {
        display: inline-grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.8);
        color: #dbeafe;
        font-size: 1.1rem;
        cursor: pointer;
        line-height: 1;
    }

    .modal-close-btn:hover {
        border-color: rgba(248, 113, 113, 0.75);
        color: #fecaca;
        background: rgba(127, 29, 29, 0.2);
    }

    .source-modal-meta {
        padding: 0.7rem 1.1rem 0.4rem;
        font-size: 0.9rem;
        color: #94a3b8;
    }

    .raw-msg-box {
        margin: 0.35rem 1.1rem 1.1rem;
        max-height: min(58vh, 620px);
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 0.9rem;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(2, 6, 23, 0.5);
        font-size: 0.84rem;
        color: #dbeafe;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .raw-msg-box::-webkit-scrollbar {
        width: 0;
        height: 0;
    }

    @media (max-width: 760px) {
        #chat-shell {
            height: calc(100vh - 230px);
        }

        #chat-window {
            padding-bottom: 8.2rem;
        }

        #chat-form {
            grid-template-columns: 1fr auto;
        }

        #model-select,
        #chat-status {
            grid-column: 1 / -1;
        }

        #chat-status {
            text-align: left;
        }
    }
</style>

<div id="chat-shell"><div id="chat-wrapper"><div id="chat-window"></div></div></div>

<div id="chat-input-bar">
    <form id="chat-form">
        <select id="model-select" class="control" aria-label="Model selector">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <input type="text" id="chat-input" placeholder="Ask about rent/lease/sale listings in your uploaded chats..." required autocomplete="off">
        <small id="chat-status">Ready</small>
        <button type="submit" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </form>
</div>

<dialog id="source-modal">
    <article>
        <div class="source-modal-header">
            <h3 class="source-modal-title">Original Message</h3>
            <button class="modal-close-btn" aria-label="Close" onclick="closeSourceModal()">✕</button>
        </div>
        <p class="source-modal-meta">Sender: <span id="modal-sender" style="color:#f8fafc;font-weight:600;"></span> | Time: <span id="modal-time" style="color:#f8fafc;font-weight:600;"></span></p>
        <pre id="modal-content" class="raw-msg-box">Loading...</pre>
    </article>
</dialog>

{{ history|json_script:"chat-history" }}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const serverHistory = JSON.parse(document.getElementById("chat-history").textContent);
    const chatWindow = document.getElementById("chat-window");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const modelSelect = document.getElementById("model-select");
    const chatStatus = document.getElementById("chat-status");
    const modal = document.getElementById("source-modal");

    function closeSourceModal() {
        if (modal.open) modal.close();
    }

    async function openSourceModal(listingId) {
        if (typeof modal.showModal === "function") {
            modal.showModal();
        } else {
            modal.setAttribute("open", true);
        }
        document.getElementById("modal-content").textContent = "Loading original message...";
        try {
            const res = await fetch(`/core/chat/source/${listingId}/`);
            if (!res.ok) throw new Error("Fetch failed");
            const data = await res.json();
            document.getElementById("modal-content").textContent = data.raw_text || "N/A";
            document.getElementById("modal-sender").textContent = data.sender || "Unknown";
            document.getElementById("modal-time").textContent = data.timestamp || "N/A";
        } catch {
            document.getElementById("modal-content").textContent = "Error loading source message.";
        }
    }

    function enhanceSourceButtons(root) {
        root.querySelectorAll("table").forEach(table => {
            let idColIndex = -1;
            table.querySelectorAll("th").forEach((th, idx) => {
                const txt = th.textContent.trim().toLowerCase();
                if (txt === "id" || txt === "_id") { idColIndex = idx; th.textContent = "source"; }
            });
            if (idColIndex === -1) return;
            table.querySelectorAll("tbody tr").forEach(row => {
                const cells = row.querySelectorAll("td");
                const target = cells[idColIndex];
                if (!target) return;
                const idVal = target.textContent.trim();
                target.innerHTML = "";
                const btn = document.createElement("button");
                btn.className = "source-btn";
                btn.textContent = "View Message";
                btn.onclick = () => openSourceModal(idVal);
                target.appendChild(btn);
            });
        });
    }

    function formatMessage(role, text, streaming=false) {
        const div = document.createElement("div");
        div.classList.add("msg", role === "user" ? "user-msg" : "assistant-msg");
        if (role === "assistant") {
            div.innerHTML = marked.parse(text || "");
            if (!streaming) enhanceSourceButtons(div);
        } else {
            div.textContent = text;
        }
        return div;
    }

    function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    serverHistory.forEach(msg => chatWindow.appendChild(formatMessage(msg.role, msg.content)));
    scrollBottom();

    async function streamAnswer(question) {
        const selectedModel = modelSelect.value;
        chatStatus.textContent = "Thinking...";

        const assistantBubble = formatMessage("assistant", "", true);
        chatWindow.appendChild(assistantBubble);
        scrollBottom();

        const res = await fetch("/core/chat/stream/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ query: question, model: selectedModel, top_k: 8 })
        });

        if (!res.ok || !res.body) {
            assistantBubble.innerHTML = marked.parse("⚠️ Request failed.");
            chatStatus.textContent = "Failed";
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let answer = "";

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const evt = JSON.parse(line);
                    if (evt.type === "token") {
                        answer += evt.delta || "";
                        assistantBubble.innerHTML = marked.parse(answer);
                        scrollBottom();
                    } else if (evt.type === "done") {
                        chatStatus.textContent = `Model: ${evt.model || selectedModel}`;
                    } else if (evt.type === "error") {
                        chatStatus.textContent = "Stream error";
                    }
                } catch (_) {}
            }
        }

        assistantBubble.innerHTML = marked.parse(answer || "⚠️ Empty response.");
        enhanceSourceButtons(assistantBubble);
        scrollBottom();
    }

    chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;

        chatWindow.appendChild(formatMessage("user", question));
        chatInput.value = "";
        scrollBottom();

        try {
            await streamAnswer(question);
        } catch {
            chatWindow.appendChild(formatMessage("assistant", "⚠️ Connection error."));
            chatStatus.textContent = "Connection error";
        }
    });
</script>
{% endblock %}
