{% extends 'base.html' %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<style>
    main {
        padding-bottom: 7rem;
    }

    #chat-shell {
        width: min(1080px, 100%);
        margin: 0 auto;
        height: calc(100vh - 210px);
        min-height: 420px;
        display: flex;
        flex-direction: column;
    }

    #chat-wrapper {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
    }

    #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.25rem 7.5rem;
        scrollbar-width: thin;
    }

    .msg {
        max-width: min(800px, 92%);
        margin-bottom: 0.65rem;
        padding: 0.62rem 0.82rem;
        border-radius: 14px;
        border: 1px solid var(--pico-muted-border-color);
        font-size: 0.86rem;
        line-height: 1.45;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    .user-msg {
        margin-left: auto;
        color: #eaf4ff;
        background: linear-gradient(145deg, rgba(30, 64, 175, 0.92), rgba(37, 99, 235, 0.85));
        border-bottom-right-radius: 4px;
    }

    .assistant-msg {
        margin-right: auto;
        color: #dde7f8;
        background: rgba(17, 24, 39, 0.8);
        border-bottom-left-radius: 4px;
    }

    .msg h1, .msg h2, .msg h3, .msg h4 {
        margin: 0.3rem 0;
        font-size: 0.92rem;
    }

    .msg p, .msg li {
        margin: 0.28rem 0;
    }

    .msg ul, .msg ol {
        margin: 0.32rem 0 0.42rem 1rem;
    }

    .msg table {
        width: 100%;
        display: block;
        overflow-x: auto;
        border-collapse: collapse;
        margin-top: 0.5rem;
    }

    .msg th, .msg td {
        padding: 0.42rem 0.56rem;
        white-space: nowrap;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
    }

    .msg th {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #93c5fd;
        font-size: 0.72rem;
    }

    #chat-input-bar {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        width: min(1020px, 96%);
        z-index: 80;
    }

    #chat-form {
        display: grid;
        grid-template-columns: 210px 1fr auto auto;
        gap: 0.65rem;
        align-items: center;
        padding: 0.7rem;
        border: 1px solid rgba(99, 179, 237, 0.24);
        border-radius: 18px;
        background: linear-gradient(145deg, rgba(12, 18, 32, 0.95), rgba(15, 26, 48, 0.94));
        backdrop-filter: blur(14px);
        box-shadow: 0 16px 42px rgba(2, 8, 23, 0.52), inset 0 1px 0 rgba(148, 163, 184, 0.12);
    }

    .control,
    #chat-input {
        height: 48px;
        margin: 0;
        border-radius: 13px;
        font-size: 0.95rem;
        padding: 0 0.95rem;
        border: 1px solid rgba(148, 163, 184, 0.26);
        background: rgba(12, 19, 33, 0.92);
        color: #e6edf8;
    }

    .control:focus,
    #chat-input:focus {
        outline: none;
        border-color: rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.23);
    }

    #model-select {
        appearance: none;
        background-image:
            linear-gradient(45deg, transparent 50%, #7dd3fc 50%),
            linear-gradient(135deg, #7dd3fc 50%, transparent 50%);
        background-position:
            calc(100% - 18px) calc(50% - 3px),
            calc(100% - 12px) calc(50% - 3px);
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        font-weight: 600;
        letter-spacing: 0.01em;
    }

    #chat-input::placeholder {
        color: rgba(191, 203, 219, 0.92);
    }

    #chat-status {
        font-size: 0.8rem;
        color: #9bb2ce;
        min-width: 116px;
        text-align: right;
        font-weight: 500;
    }

    .send-btn {
        width: 48px;
        height: 48px;
        margin: 0;
        border-radius: 999px;
        border: none;
        background: linear-gradient(145deg, #0ea5e9, #2563eb 58%, #1d4ed8);
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .send-btn:hover {
        transform: translateY(-1px) scale(1.01);
        box-shadow: 0 12px 24px rgba(14, 165, 233, 0.42);
        filter: brightness(1.05);
    }

    .send-btn svg {
        width: 18px;
        height: 18px;
        fill: white;
    }

    .source-btn {
        margin: 0;
        padding: 0.38rem 0.8rem;
        border-radius: 999px;
        font-size: 0.77rem;
        font-weight: 650;
        border: 1px solid rgba(56, 189, 248, 0.82);
        background: linear-gradient(145deg, rgba(14, 165, 233, 0.3), rgba(2, 132, 199, 0.22));
        color: #cff5ff;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .source-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(145deg, rgba(56, 189, 248, 0.42), rgba(14, 116, 144, 0.28));
        box-shadow: 0 8px 16px rgba(14, 165, 233, 0.3);
    }

    dialog::backdrop {
        background: rgba(2, 6, 23, 0.75);
    }

    dialog article {
        width: min(760px, 96vw);
        max-height: 82vh;
        overflow: hidden;
        background: linear-gradient(160deg, rgba(12, 18, 32, 0.98), rgba(17, 28, 47, 0.97)) !important;
        border: 1px solid rgba(125, 211, 252, 0.32);
        border-radius: 18px;
        box-shadow: 0 24px 45px rgba(2, 6, 23, 0.62);
    }

    dialog header h3 {
        margin: 0;
        color: #e9f4ff;
        letter-spacing: 0.01em;
    }

    .raw-msg-box {
        max-height: 56vh;
        overflow-y: auto;
        padding: 0.95rem;
        border-radius: 12px;
        background: rgba(4, 10, 22, 0.72);
        border: 1px solid rgba(71, 85, 105, 0.45);
        color: #d8e3f3;
        font-size: 0.86rem;
        line-height: 1.5;
        white-space: pre-wrap;
    }

    @media (max-width: 760px) {
        #chat-shell {
            height: calc(100vh - 230px);
        }

        #chat-window {
            padding-bottom: 8.2rem;
        }

        #chat-form {
            grid-template-columns: 1fr auto;
        }

        #model-select,
        #chat-status {
            grid-column: 1 / -1;
        }

        #chat-status {
            text-align: left;
        }
    }
</style>

<div id="chat-shell"><div id="chat-wrapper"><div id="chat-window"></div></div></div>

<div id="chat-input-bar">
    <form id="chat-form">
        <select id="model-select" class="control" aria-label="Model selector">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <input type="text" id="chat-input" placeholder="Ask about rent/lease/sale listings in your uploaded chats..." required autocomplete="off">
        <small id="chat-status">Ready</small>
        <button type="submit" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </form>
</div>

<dialog id="source-modal">
    <article>
        <header>
            <button aria-label="Close" rel="prev" onclick="closeSourceModal()"></button>
            <h3>Original Message</h3>
        </header>
        <p style="font-size:0.9rem;color:#94a3b8;margin-bottom:.5rem;">Sender: <span id="modal-sender" style="color:white"></span> | Time: <span id="modal-time" style="color:white"></span></p>
        <pre id="modal-content" class="raw-msg-box">Loading...</pre>
    </article>
</dialog>

{{ history|json_script:"chat-history" }}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const serverHistory = JSON.parse(document.getElementById("chat-history").textContent);
    const chatWindow = document.getElementById("chat-window");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const modelSelect = document.getElementById("model-select");
    const chatStatus = document.getElementById("chat-status");
    const modal = document.getElementById("source-modal");

    function closeSourceModal() {
        if (modal.open) modal.close();
    }

    async function openSourceModal(listingId) {
        if (typeof modal.showModal === "function") {
            modal.showModal();
        } else {
            modal.setAttribute("open", true);
        }
        document.getElementById("modal-content").textContent = "Loading original message...";
        try {
            const res = await fetch(`/core/chat/source/${listingId}/`);
            if (!res.ok) throw new Error("Fetch failed");
            const data = await res.json();
            document.getElementById("modal-content").textContent = data.raw_text || "N/A";
            document.getElementById("modal-sender").textContent = data.sender || "Unknown";
            document.getElementById("modal-time").textContent = data.timestamp || "N/A";
        } catch {
            document.getElementById("modal-content").textContent = "Error loading source message.";
        }
    }

    function enhanceSourceButtons(root) {
        root.querySelectorAll("table").forEach(table => {
            let idColIndex = -1;
            table.querySelectorAll("th").forEach((th, idx) => {
                const txt = th.textContent.trim().toLowerCase();
                if (txt === "id" || txt === "_id") { idColIndex = idx; th.textContent = "source"; }
            });
            if (idColIndex === -1) return;
            table.querySelectorAll("tbody tr").forEach(row => {
                const cells = row.querySelectorAll("td");
                const target = cells[idColIndex];
                if (!target) return;
                const idVal = target.textContent.trim();
                target.innerHTML = "";
                const btn = document.createElement("button");
                btn.className = "source-btn";
                btn.textContent = "Open Source";
                btn.onclick = () => openSourceModal(idVal);
                target.appendChild(btn);
            });
        });
    }

    function formatMessage(role, text, streaming=false) {
        const div = document.createElement("div");
        div.classList.add("msg", role === "user" ? "user-msg" : "assistant-msg");
        if (role === "assistant") {
            div.innerHTML = marked.parse(text || "");
            if (!streaming) enhanceSourceButtons(div);
        } else {
            div.textContent = text;
        }
        return div;
    }

    function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    serverHistory.forEach(msg => chatWindow.appendChild(formatMessage(msg.role, msg.content)));
    scrollBottom();

    async function streamAnswer(question) {
        const selectedModel = modelSelect.value;
        chatStatus.textContent = "Thinking...";

        const assistantBubble = formatMessage("assistant", "", true);
        chatWindow.appendChild(assistantBubble);
        scrollBottom();

        const res = await fetch("/core/chat/stream/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ query: question, model: selectedModel, top_k: 8 })
        });

        if (!res.ok || !res.body) {
            assistantBubble.innerHTML = marked.parse("⚠️ Request failed.");
            chatStatus.textContent = "Failed";
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let answer = "";

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const evt = JSON.parse(line);
                    if (evt.type === "token") {
                        answer += evt.delta || "";
                        assistantBubble.innerHTML = marked.parse(answer);
                        scrollBottom();
                    } else if (evt.type === "done") {
                        chatStatus.textContent = `Model: ${evt.model || selectedModel}`;
                    } else if (evt.type === "error") {
                        chatStatus.textContent = "Stream error";
                    }
                } catch (_) {}
            }
        }

        assistantBubble.innerHTML = marked.parse(answer || "⚠️ Empty response.");
        enhanceSourceButtons(assistantBubble);
        scrollBottom();
    }

    chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;

        chatWindow.appendChild(formatMessage("user", question));
        chatInput.value = "";
        scrollBottom();

        try {
            await streamAnswer(question);
        } catch {
            chatWindow.appendChild(formatMessage("assistant", "⚠️ Connection error."));
            chatStatus.textContent = "Connection error";
        }
    });
</script>
{% endblock %}
