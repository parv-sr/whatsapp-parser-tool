{% extends 'base.html' %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<style>
    /* --- LAYOUT OVERRIDES (Fixes Scroll) --- */
    body {
        height: 100vh !important;       /* Force viewport height */
        overflow: hidden !important;    /* Disable window scrollbar */
        /* Body is already flex-col in base.html, so Header + Main stack naturally */
    }

    main.container {
        flex: 1;                        /* Fill remaining vertical space */
        display: flex !important;       /* Turn Main into a flex container */
        flex-direction: column;
        min-height: 0;                  /* CRITICAL: Allows children to scroll */
        padding: 0 !important;          /* Remove base.html padding */
        max-width: 100% !important;     /* Full width for chat */
        height: auto !important;
    }

    #chat-wrapper {
        display: flex; flex-direction: column; flex: 1;
        width: 100%; max-width: 1100px; margin: 0 auto;
        min-height: 0;                  /* CRITICAL: Allows #chat-window to scroll */
    }
    #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 1.2rem 1rem 10rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    .msg {
        max-width: min(900px, 92%);
        padding: .8rem 1rem;
        margin-bottom: .9rem;
        border-radius: 16px;
        line-height: 1.5;
        font-size: .92rem;
        word-break: break-word;
        border: 1px solid rgba(255,255,255,0.08);
        animation: slideUp .18s ease-out;
    }
    @keyframes slideUp { from {opacity: 0; transform: translateY(8px);} to {opacity: 1; transform: translateY(0);} }
    .user-msg {
        margin-left: auto;
        background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        color: white;
        border-bottom-right-radius: 6px;
    }
    .assistant-msg {
        margin-right: auto;
        background: rgba(9, 14, 24, 0.86);
        border-bottom-left-radius: 6px;
        color: #e8ecf3;
    }

    .msg h3, .msg h4 { margin: .35rem 0 .4rem; color: #dbeafe; }
    .msg ul { margin: .2rem 0 .6rem 1.1rem; }

    .msg table { width: 100%; display: block; overflow-x: auto; border-collapse: collapse; margin-top: .5rem; }
    .msg th, .msg td { padding: .48rem .65rem; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .msg th { background: rgba(0,0,0,.35); color: #93c5fd; text-transform: uppercase; font-size: .76rem; }

    #chat-input-bar {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        width: min(1050px, 96%);
        z-index: 100;
    }

    #chat-form {
        display: grid;
        grid-template-columns: minmax(140px, 190px) 1fr auto auto;
        gap: .55rem;
        align-items: center;
        padding: .55rem;
        border-radius: 16px;
        background: rgba(7, 12, 22, .92);
        border: 1px solid rgba(255,255,255,.12);
        box-shadow: 0 12px 40px rgba(0,0,0,.36);
        backdrop-filter: blur(14px);
    }

    .control {
        height: 42px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(255,255,255,.04);
        color: #e2e8f0;
        padding: 0 .75rem;
    }

    #chat-input {
        width: 100%;
        height: 42px;
        min-width: 0;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.18);
        background: rgba(255,255,255,.03);
        color: #fff;
        padding: 0 .9rem;
    }
    #chat-input::placeholder { color: rgba(255,255,255,.45); }

    #chat-status { color: #93a4ba; font-size: .8rem; min-width: 86px; text-align: right; }

    .send-btn {
        width: 42px; height: 42px; border-radius: 999px; border: none;
        display: grid; place-items: center;
        background: linear-gradient(120deg, #0ea5e9, #2563eb);
        cursor: pointer;
    }
    .send-btn svg { width: 18px; height: 18px; fill: white; margin-left: 1px; }

    .source-btn {
        background: rgba(14, 165, 233, 0.14); color: #38bdf8; border: 1px solid rgba(56,189,248,.4);
        padding: 4px 10px; border-radius: 8px; font-size: .74rem; cursor: pointer;
    }

    dialog article { background: rgba(20,25,35,0.96) !important; color: #f8fafc; border: 1px solid rgba(255,255,255,.15); }
    .raw-msg-box { max-height: 50vh; overflow: auto; padding: .8rem; background: rgba(0,0,0,.33); border-radius: 8px; }

    @media (max-width: 760px) {
        #chat-form { grid-template-columns: 1fr auto; }
        #model-select, #chat-status { grid-column: span 1; }
    }
</style>

<div id="chat-wrapper"><div id="chat-window"></div></div>

<div id="chat-input-bar">
    <form id="chat-form">
        <select id="model-select" class="control" aria-label="Model selector">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <input type="text" id="chat-input" placeholder="Ask about rent/lease/sale listings in your uploaded chats..." required autocomplete="off">
        <small id="chat-status">Ready</small>
        <button type="submit" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </form>
</div>

<dialog id="source-modal">
    <article>
        <header>
            <button aria-label="Close" rel="prev" onclick="closeSourceModal()"></button>
            <h3>Original Message</h3>
        </header>
        <p style="font-size:0.9rem;color:#94a3b8;margin-bottom:.5rem;">Sender: <span id="modal-sender" style="color:white"></span> | Time: <span id="modal-time" style="color:white"></span></p>
        <pre id="modal-content" class="raw-msg-box">Loading...</pre>
    </article>
</dialog>

{{ history|json_script:"chat-history" }}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const serverHistory = JSON.parse(document.getElementById("chat-history").textContent);
    const chatWindow = document.getElementById("chat-window");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const modelSelect = document.getElementById("model-select");
    const chatStatus = document.getElementById("chat-status");
    const modal = document.getElementById("source-modal");

    function closeSourceModal() { modal.removeAttribute("open"); }

    async function openSourceModal(listingId) {
        modal.setAttribute("open", true);
        document.getElementById("modal-content").textContent = "Loading original message...";
        try {
            const res = await fetch(`/core/chat/source/${listingId}/`);
            if (!res.ok) throw new Error("Fetch failed");
            const data = await res.json();
            document.getElementById("modal-content").textContent = data.raw_text || "N/A";
            document.getElementById("modal-sender").textContent = data.sender || "Unknown";
            document.getElementById("modal-time").textContent = data.timestamp || "N/A";
        } catch {
            document.getElementById("modal-content").textContent = "Error loading source message.";
        }
    }

    function enhanceSourceButtons(root) {
        root.querySelectorAll("table").forEach(table => {
            let idColIndex = -1;
            table.querySelectorAll("th").forEach((th, idx) => {
                const txt = th.textContent.trim().toLowerCase();
                if (txt === "id" || txt === "_id") { idColIndex = idx; th.textContent = "source"; }
            });
            if (idColIndex === -1) return;
            table.querySelectorAll("tbody tr").forEach(row => {
                const cells = row.querySelectorAll("td");
                const target = cells[idColIndex];
                if (!target) return;
                const idVal = target.textContent.trim();
                target.innerHTML = "";
                const btn = document.createElement("button");
                btn.className = "source-btn";
                btn.textContent = "View Message";
                btn.onclick = () => openSourceModal(idVal);
                target.appendChild(btn);
            });
        });
    }

    function formatMessage(role, text, streaming=false) {
        const div = document.createElement("div");
        div.classList.add("msg", role === "user" ? "user-msg" : "assistant-msg");
        if (role === "assistant") {
            div.innerHTML = marked.parse(text || "");
            if (!streaming) enhanceSourceButtons(div);
        } else {
            div.textContent = text;
        }
        return div;
    }

    function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    serverHistory.forEach(msg => chatWindow.appendChild(formatMessage(msg.role, msg.content)));
    scrollBottom();

    async function streamAnswer(question) {
        const selectedModel = modelSelect.value;
        chatStatus.textContent = "Thinking...";

        const assistantBubble = formatMessage("assistant", "", true);
        chatWindow.appendChild(assistantBubble);
        scrollBottom();

        const res = await fetch("/core/chat/stream/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ query: question, model: selectedModel, top_k: 8 })
        });

        if (!res.ok || !res.body) {
            assistantBubble.innerHTML = marked.parse("⚠️ Request failed.");
            chatStatus.textContent = "Failed";
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let answer = "";

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const evt = JSON.parse(line);
                    if (evt.type === "token") {
                        answer += evt.delta || "";
                        assistantBubble.innerHTML = marked.parse(answer);
                        scrollBottom();
                    } else if (evt.type === "done") {
                        chatStatus.textContent = `Model: ${evt.model || selectedModel}`;
                    } else if (evt.type === "error") {
                        chatStatus.textContent = "Stream error";
                    }
                } catch (_) {}
            }
        }

        assistantBubble.innerHTML = marked.parse(answer || "⚠️ Empty response.");
        enhanceSourceButtons(assistantBubble);
        scrollBottom();
    }

    chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;

        chatWindow.appendChild(formatMessage("user", question));
        chatInput.value = "";
        scrollBottom();

        try {
            await streamAnswer(question);
        } catch {
            chatWindow.appendChild(formatMessage("assistant", "⚠️ Connection error."));
            chatStatus.textContent = "Connection error";
        }
    });
</script>
{% endblock %}
