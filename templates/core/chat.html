{% extends 'base.html' %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<style>
    :root {
        --accent: #00d4aa;
    }

    main {
        padding-bottom: 7rem;
    }

    #chat-shell {
        width: min(1080px, 100%);
        margin: 0 auto;
        height: calc(100vh - 210px);
        min-height: 420px;
        display: flex;
        flex-direction: column;
    }

    #chat-wrapper {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
    }

    #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.25rem 7.5rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 212, 170, 0.32) rgba(30, 41, 59, 0.35);
    }

    .msg {
        max-width: min(800px, 92%);
        margin-bottom: 0.65rem;
        padding: 0.62rem 0.82rem;
        border-radius: 14px;
        border: 1px solid var(--pico-muted-border-color);
        font-size: 0.86rem;
        line-height: 1.45;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    .user-msg {
        margin-left: auto;
        color: #eaf4ff;
        background: linear-gradient(145deg, rgba(30, 64, 175, 0.92), rgba(37, 99, 235, 0.85));
        border-bottom-right-radius: 4px;
    }

    .assistant-msg {
        margin-right: auto;
        color: #dde7f8;
        background: rgba(17, 24, 39, 0.8);
        border-bottom-left-radius: 4px;
    }

    .msg h1, .msg h2, .msg h3, .msg h4 {
        margin: 0.3rem 0;
        font-size: 0.92rem;
    }

    .msg p, .msg li {
        margin: 0.28rem 0;
    }

    .msg ul, .msg ol {
        margin: 0.32rem 0 0.42rem 1rem;
    }

    .msg table {
        width: 100%;
        display: block;
        overflow-x: auto;
        border-collapse: collapse;
        margin-top: 0.5rem;
    }

    .msg th, .msg td {
        padding: 0.42rem 0.56rem;
        white-space: nowrap;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
    }

    .msg th {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #93c5fd;
        font-size: 0.72rem;
    }

    #chat-input-bar {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        width: min(1020px, 96%);
        z-index: 80;
    }

    #chat-form {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.42rem;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 170, 0.28);
        background: linear-gradient(160deg, rgba(7, 14, 27, 0.95), rgba(12, 22, 40, 0.97));
        backdrop-filter: blur(16px);
        box-shadow:
            0 20px 40px rgba(2, 6, 23, 0.58),
            inset 0 1px 0 rgba(148, 163, 184, 0.16),
            inset 0 0 0 1px rgba(0, 212, 170, 0.08);
    }

    .control,
    #chat-input {
        height: 50px;
        margin: 0;
        border-radius: 999px;
        font-size: 0.95rem;
        border: 0;
        outline: none;
        box-shadow: none;
        background: transparent;
        color: #dbe7f5;
    }

    .control:focus,
    #chat-input:focus {
        outline: none;
        box-shadow: none;
    }

    #model-select {
        appearance: none;
        flex: 0 0 192px;
        padding: 0 2.3rem 0 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #d8ebff;
        background-color: rgba(17, 29, 49, 0.78);
        background-image:
            linear-gradient(45deg, transparent 50%, var(--accent) 50%),
            linear-gradient(135deg, var(--accent) 50%, transparent 50%),
            linear-gradient(160deg, rgba(15, 23, 42, 0.85), rgba(30, 41, 59, 0.7));
        background-position:
            calc(100% - 18px) calc(50% - 4px),
            calc(100% - 12px) calc(50% - 4px),
            center;
        background-size: 7px 7px, 7px 7px, 100% 100%;
        background-repeat: no-repeat;
    }

    #model-select option {
        background: #0f172a;
        color: #dbeafe;
    }

    #chat-input {
        flex: 1;
        min-width: 0;
        padding: 0 0.9rem;
        color: #e2ebf8;
    }

    #chat-input::placeholder {
        color: rgba(191, 203, 219, 0.78);
    }

    #chat-status {
        flex: 0 0 auto;
        font-size: 0.76rem;
        color: #b8d8d5;
        padding: 0.28rem 0.72rem;
        border-radius: 999px;
        background: rgba(11, 28, 43, 0.72);
        border: 1px solid rgba(0, 212, 170, 0.22);
        font-weight: 500;
        text-align: center;
    }

    .send-btn {
        width: 50px;
        height: 50px;
        flex: 0 0 50px;
        margin: 0;
        border-radius: 999px;
        border: none;
        background: linear-gradient(145deg, var(--accent), #06b6d4);
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(0, 212, 170, 0.33);
        transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .send-btn:hover {
        transform: translateY(-1px) scale(1.01);
        box-shadow: 0 12px 26px rgba(0, 212, 170, 0.4);
        filter: brightness(1.05);
    }

    .send-btn svg {
        width: 18px;
        height: 18px;
        fill: white;
    }

    dialog::backdrop {
        background: rgba(2, 6, 23, 0.75);
    }

    .modal-modern {
        width: min(860px, 96vw);
        max-height: 86vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: linear-gradient(165deg, rgba(10, 19, 34, 0.98), rgba(15, 29, 50, 0.98)) !important;
        border: 1px solid rgba(0, 212, 170, 0.32);
        border-radius: 22px;
        box-shadow: 0 28px 48px rgba(2, 6, 23, 0.65);
        padding: 1rem;
    }

    .modal-modern header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        padding-bottom: 0.6rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        margin-bottom: 0.78rem;
    }

    .modal-modern h3 {
        margin: 0;
        color: #e5f8ff;
        font-size: 1.08rem;
        font-weight: 650;
        letter-spacing: 0.01em;
    }

    .modal-meta {
        margin: 0 0 0.88rem;
        padding: 0.62rem 0.78rem;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(9, 18, 34, 0.66);
        color: #9cb3cb;
        font-size: 0.88rem;
        line-height: 1.45;
    }

    .modal-meta strong {
        color: #e6f2ff;
        font-weight: 600;
    }

    .modal-actions {
        display: flex;
        align-items: center;
        gap: 0.55rem;
    }

    .modal-btn {
        border: 1px solid rgba(0, 212, 170, 0.34);
        background: linear-gradient(155deg, rgba(15, 36, 54, 0.92), rgba(6, 25, 37, 0.92));
        color: #d5fffa;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.45rem 0.92rem;
        margin: 0;
        line-height: 1;
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }

    .modal-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 9px 16px rgba(0, 212, 170, 0.25);
        filter: brightness(1.06);
    }

    .modal-btn-copy {
        background: linear-gradient(145deg, rgba(0, 212, 170, 0.26), rgba(6, 182, 212, 0.24));
        border-color: rgba(0, 212, 170, 0.62);
    }

    .modal-btn-close {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-size: 1.16rem;
        color: #c5d3e8;
    }

    .modal-copy-status {
        min-height: 1.15rem;
        margin: 0 0 0.45rem;
        color: #7debcf;
        font-size: 0.78rem;
        font-weight: 600;
        opacity: 0;
        transform: translateY(-2px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        pointer-events: none;
    }

    .modal-copy-status.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .raw-msg-box {
        min-height: 200px;
        max-height: 56vh;
        overflow-y: auto;
        margin: 0;
        padding: 1rem 1.05rem;
        border-radius: 14px;
        background: rgba(3, 10, 22, 0.76);
        border: 1px solid rgba(71, 85, 105, 0.38);
        color: #dbe7f4;
        font-size: 0.86rem;
        font-family: "JetBrains Mono", "Fira Code", "Consolas", "Menlo", monospace;
        line-height: 1.6;
        letter-spacing: 0.005em;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
    }

    .source-btn {
        margin: 0;
        padding: 0.38rem 0.82rem;
        border-radius: 999px;
        font-size: 0.77rem;
        font-weight: 650;
        border: 1px solid rgba(0, 212, 170, 0.72);
        background: linear-gradient(145deg, rgba(0, 212, 170, 0.24), rgba(8, 145, 178, 0.2));
        color: #c7fff0;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
    }

    .source-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(145deg, rgba(0, 212, 170, 0.35), rgba(6, 182, 212, 0.24));
        box-shadow: 0 8px 16px rgba(0, 212, 170, 0.24);
    }

    * {
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 212, 170, 0.35) rgba(15, 23, 42, 0.45);
    }

    *::-webkit-scrollbar {
        width: 9px;
        height: 9px;
    }

    *::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.45);
        border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
        border-radius: 999px;
        border: 2px solid rgba(15, 23, 42, 0.45);
        background: linear-gradient(180deg, rgba(0, 212, 170, 0.55), rgba(6, 182, 212, 0.35));
    }

    *::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(0, 212, 170, 0.72), rgba(6, 182, 212, 0.48));
    }

    @media (max-width: 760px) {
        #chat-shell {
            height: calc(100vh - 230px);
        }

        #chat-window {
            padding-bottom: 8.2rem;
        }

        #chat-input-bar {
            bottom: 8px;
        }

        #chat-form {
            border-radius: 22px;
            flex-wrap: wrap;
            gap: 0.36rem;
            padding: 0.46rem;
        }

        #model-select {
            flex: 1 1 100%;
        }

        #chat-input {
            flex: 1 1 calc(100% - 60px);
            order: 2;
        }

        #chat-status {
            order: 3;
            font-size: 0.72rem;
            padding: 0.24rem 0.62rem;
        }

        .send-btn {
            order: 4;
            width: 46px;
            height: 46px;
            flex-basis: 46px;
        }

        .modal-modern {
            width: 98vw;
            max-height: 88vh;
            padding: 0.78rem;
        }

        .modal-meta {
            font-size: 0.82rem;
        }
    }
</style>

<div id="chat-shell"><div id="chat-wrapper"><div id="chat-window"></div></div></div>

<div id="chat-input-bar">
    <form id="chat-form">
        <select id="model-select" class="control" aria-label="Model selector">
            {% for model in available_models %}
            <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>
        <input type="text" id="chat-input" placeholder="Ask about rent/lease/sale listings in your uploaded chats..." required autocomplete="off">
        <small id="chat-status">Ready</small>
        <button type="submit" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </form>
</div>

<dialog id="source-modal">
    <article class="modal-modern">
        <header>
            <h3>Original Message</h3>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-copy" onclick="copyModalContent()">Copy Text</button>
                <button type="button" class="modal-btn modal-btn-close" aria-label="Close" onclick="closeSourceModal()">✕</button>
            </div>
        </header>
        <p class="modal-meta">Sender: <strong id="modal-sender"></strong> · Time: <strong id="modal-time"></strong></p>
        <p id="modal-copy-status" class="modal-copy-status" role="status" aria-live="polite"></p>
        <pre id="modal-content" class="raw-msg-box">Loading...</pre>
    </article>
</dialog>

{{ history|json_script:"chat-history" }}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const serverHistory = JSON.parse(document.getElementById("chat-history").textContent);
    const chatWindow = document.getElementById("chat-window");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const modelSelect = document.getElementById("model-select");
    const chatStatus = document.getElementById("chat-status");
    const modal = document.getElementById("source-modal");
    const modalContent = document.getElementById("modal-content");
    const modalCopyStatus = document.getElementById("modal-copy-status");
    let copyToastTimer = null;

    function closeSourceModal() {
        if (modal.open) modal.close();
    }

    async function openSourceModal(listingId) {
        if (typeof modal.showModal === "function") {
            modal.showModal();
        } else {
            modal.setAttribute("open", true);
        }
        modalCopyStatus.classList.remove("visible");
        modalCopyStatus.textContent = "";
        modalContent.textContent = "Loading original message...";
        try {
            const res = await fetch(`/core/chat/source/${listingId}/`);
            if (!res.ok) throw new Error("Fetch failed");
            const data = await res.json();
            modalContent.textContent = data.raw_text || "N/A";
            document.getElementById("modal-sender").textContent = data.sender || "Unknown";
            document.getElementById("modal-time").textContent = data.timestamp || "N/A";
        } catch {
            modalContent.textContent = "Error loading source message.";
        }
    }

    function showCopyToast(message, isError = false) {
        if (copyToastTimer) clearTimeout(copyToastTimer);
        modalCopyStatus.textContent = message;
        modalCopyStatus.style.color = isError ? "#fda4af" : "#7debcf";
        modalCopyStatus.classList.add("visible");
        copyToastTimer = setTimeout(() => {
            modalCopyStatus.classList.remove("visible");
        }, 1800);
    }

    async function copyModalContent() {
        const text = modalContent.textContent || "";
        if (!text.trim()) {
            showCopyToast("Nothing to copy yet.", true);
            return;
        }
        try {
            await navigator.clipboard.writeText(text);
            showCopyToast("Copied original message.");
        } catch {
            showCopyToast("Copy failed. Please copy manually.", true);
        }
    }

    function enhanceSourceButtons(root) {
        root.querySelectorAll("table").forEach(table => {
            let idColIndex = -1;
            table.querySelectorAll("th").forEach((th, idx) => {
                const txt = th.textContent.trim().toLowerCase();
                if (txt === "id" || txt === "_id") { idColIndex = idx; th.textContent = "source"; }
            });
            if (idColIndex === -1) return;
            table.querySelectorAll("tbody tr").forEach(row => {
                const cells = row.querySelectorAll("td");
                const target = cells[idColIndex];
                if (!target) return;
                const idVal = target.textContent.trim();
                target.innerHTML = "";
                const btn = document.createElement("button");
                btn.className = "source-btn";
                btn.innerHTML = '<span aria-hidden="true">👁</span> View Original';
                btn.onclick = () => openSourceModal(idVal);
                target.appendChild(btn);
            });
        });
    }

    function formatMessage(role, text, streaming=false) {
        const div = document.createElement("div");
        div.classList.add("msg", role === "user" ? "user-msg" : "assistant-msg");
        if (role === "assistant") {
            div.innerHTML = marked.parse(text || "");
            if (!streaming) enhanceSourceButtons(div);
        } else {
            div.textContent = text;
        }
        return div;
    }

    function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    serverHistory.forEach(msg => chatWindow.appendChild(formatMessage(msg.role, msg.content)));
    scrollBottom();

    async function streamAnswer(question) {
        const selectedModel = modelSelect.value;
        chatStatus.textContent = "Thinking...";

        const assistantBubble = formatMessage("assistant", "", true);
        chatWindow.appendChild(assistantBubble);
        scrollBottom();

        const res = await fetch("/core/chat/stream/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ query: question, model: selectedModel, top_k: 8 })
        });

        if (!res.ok || !res.body) {
            assistantBubble.innerHTML = marked.parse("⚠️ Request failed.");
            chatStatus.textContent = "Failed";
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let answer = "";

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const evt = JSON.parse(line);
                    if (evt.type === "token") {
                        answer += evt.delta || "";
                        assistantBubble.innerHTML = marked.parse(answer);
                        scrollBottom();
                    } else if (evt.type === "done") {
                        chatStatus.textContent = `Model: ${evt.model || selectedModel}`;
                    } else if (evt.type === "error") {
                        chatStatus.textContent = "Stream error";
                    }
                } catch (_) {}
            }
        }

        assistantBubble.innerHTML = marked.parse(answer || "⚠️ Empty response.");
        enhanceSourceButtons(assistantBubble);
        scrollBottom();
    }

    chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;

        chatWindow.appendChild(formatMessage("user", question));
        chatInput.value = "";
        scrollBottom();

        try {
            await streamAnswer(question);
        } catch {
            chatWindow.appendChild(formatMessage("assistant", "⚠️ Connection error."));
            chatStatus.textContent = "Connection error";
        }
    });
</script>
{% endblock %}
