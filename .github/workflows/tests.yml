name: Django CI

on:
  push:
    branches: [ "Development", "main" ]
  pull_request:
    branches: [ "Development", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin@2025
          POSTGRES_DB: whatsapp-parser-tool-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Prepare Database Template
      env: 
        PGPASSWORD: admin@2025
      run: |
        psql -h localhost -U postgres -d template1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
        
    - name: Run Django Tests
      env:
        SECRET_KEY: 'dummy-key-for-tests'
        DEBUG: 'True'
        OPENAI_API_KEY: 'dummy-test-key-so-that-django-can-boot'
        DB_USER: postgres
        DB_PASS: admin@2025
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: whatsapp-parser-tool-db
      run: |
        python manage.py test